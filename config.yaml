# Grade Selection-driven configuration.
#
# The `production_information.line` and `.grade` fields select a profile from
# `DefectDetection/defect_detection/profiles/registry.yaml`, which supplies the
# classifier/segmenter/cluster classes, checkpoints, thresholds, `return_mode`
# default, and `show` defaults for this run.
#
# Runtime tweak paths in THIS file:
#   - production_information.return_mode  (overrides the profile default)
#   - defect_detection.show               (deep-merged on top of profile show)
#   - defect_detection.overrides          (checkpoint/threshold/classes tweaks)
#   - baler_classification.overrides      (baler classifier tweaks)
#
# `return_mode` and `show` are NOT allowed inside `overrides:` -- use the
# dedicated paths above. class_id keys inside classes are immutable; only
# name / color / pass / description can be modified per class entry.
#
# `checkpoint_root` is the single absolute path that every checkpoint inside
# a base profile is anchored to (both defect_detection and baler_classification).

checkpoint_root: C:\LG_Chemistry\BaleInspectionAIServer\Inspector-AIServer\checkpoints

production_information:
  line: SSBR
  grade: F2150
  save_meta_dir: C:\BaleMetadataDB
  save_image_dir: C:\LG_Chemistry\BaleInspectionAIServer\Inspector-AIServer\results\faulty_images
  baler_handoff_dir: C:\LG_Chemistry\BaleInspectionAIServer\Inspector-AIServer\tmp
  # return_mode: segment   # optional; defaults to profile

defect_detection:
  overrides: {}
  show: {}

baler_classification:
  overrides: {}

log_dir:
  root: "logs"
  process: "process"
  monitor: "monitor"

log_cleaner:
  enabled: true
  retention_hours: 480
  thread_interval: 3600
  allow_targets_outside_root: false

meta_cleaner:
  enabled: true
  retention_hours: 480
  thread_interval: 3600
  allow_targets_outside_root: true

faultyim_cleaner:
  enabled: true
  retention_hours: 48
  thread_interval: 3600
  allow_targets_outside_root: false

baler_handoff_cleaner:
  enabled: true
  retention_hours: 24
  thread_interval: 3600
  allow_targets_outside_root: false