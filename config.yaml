# Grade Selection-driven configuration.
#
# The `production_information.line` and `.grade` fields select the foundation
# profile by convention -- `src/Profiles/profiles/lines/<LINE>/_<grade>.py`
# (e.g. BR-B / F2150 -> lines/BRB/_F2150.py). That module supplies everything
# for this run: classifier/segmenter/cluster classes, checkpoints, thresholds,
# `return_mode`, and `show`. There is no registry or override layer; to change
# a profile, edit its base module.
#
# `checkpoint_root` is the single absolute path that every checkpoint inside
# a base profile is anchored to (both defect_detection and baler_classification).

checkpoint_root: C:\LG_Chemistry\BaleInspectionAIServer\Inspector-AIServer\checkpoints

production_information:
  line: SSBR
  grade: F2150
  save_meta_dir: C:\BaleMetadataDB
  save_image_dir: C:\LG_Chemistry\BaleInspectionAIServer\Inspector-AIServer\results\faulty_images
  baler_handoff_dir: C:\LG_Chemistry\BaleInspectionAIServer\Inspector-AIServer\tmp

log_dir:
  root: "logs"
  process: "process"
  monitor: "monitor"

log_cleaner:
  enabled: true
  retention_hours: 480
  thread_interval: 3600
  allow_targets_outside_root: false

meta_cleaner:
  enabled: true
  retention_hours: 480
  thread_interval: 3600
  allow_targets_outside_root: true

faultyim_cleaner:
  enabled: true
  retention_hours: 48
  thread_interval: 3600
  allow_targets_outside_root: false

baler_handoff_cleaner:
  enabled: true
  retention_hours: 24
  thread_interval: 3600
  allow_targets_outside_root: false